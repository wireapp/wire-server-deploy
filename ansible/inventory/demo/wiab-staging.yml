wiab-staging:
  hosts:
    deploy_node:
      ansible_host: example.com
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60 -o ServerAliveCountMax=3 -o TCPKeepAlive=yes'
      ansible_user: 'demo'
      ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
  vars:
    artifact_hash: 54c1c37d9b5d963d581d43e38c2c0b93c4c086d9
    # when enabled, disable WAN SNAT/masquerading for VMs on the private network
    private_deployment: true
