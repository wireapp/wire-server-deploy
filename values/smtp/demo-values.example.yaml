  # extraVolumeMounts:
  #   - name: dkim-key
  #     mountPath: /secrets/dkim.key
  #     subPath: wire-mail.private
  #     readOnly: true

  config:
    RELAY_NETWORKS: ":10.233.0.0/16"
  # for DKIM support
  #   MAILNAME: mail.example.com
  #   DKIM_KEY_PATH: /secrets/dkim.key
  #   DKIM_DOMAIN: "example.com"
  #   DKIM_PRIVATE_KEY: "/etc/exim4/dkim.key"

  #   PORT: "25"
