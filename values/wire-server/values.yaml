tags:
  proxy: false
  legalhold: false
  federation: false
cassandra-migrations:
  cassandra:
    host: cassandra-external
    replicationFactor: 3
elasticsearch-index:
  image:
    repository: assethost:80/wire-server/wire/brig-index
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  elasticsearch:
    host: elasticsearch-external
  cassandra:
    host: cassandra-external
brig:
  image:
    repository: assethost:80/wire-server/wire/brig
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  replicaCount: 3
  config:
    cassandra:
      host: cassandra-external
    elasticsearch:
      host: elasticsearch-external
    rabbitmq:
      host: rabbitmq-external
    postgresql:
      host: postgresql-external-rw
      port: '5432'
      user: wire-server
      dbname: wire-server
    useSES: false
    randomPrekeys: true
    aws:
      region: eu-west-1
      sqsEndpoint: http://fake-aws-sqs:4568
      internalQueue: integration-brig-events-internal
      prekeyTable: integration-brig-prekeys
    externalUrls:
      nginz: https://nginz-https.hetz-suk-a.zinfradev.com
      teamSettings: https://teams.hetz-suk-a.zinfradev.com
      teamCreatorWelcome: https://teams.hetz-suk-a.zinfradev.com/login
      teamMemberWelcome: https://wire.hetz-suk-a.zinfradev.com/download
    enableFederation: false
    optSettings:
      setFederationDomain: hetz-suk-a.zinfradev.com
      setSftStaticUrl: https://sftd.hetz-suk-a.zinfradev.com:443
      setRestrictUserCreation: false
    emailSMS:
      general:
        emailSender: email@hetz-suk-a.zinfradev.com
        smsSender: insert-sms-sender-for-twilio
        templateBranding:
          brand: Wire
          brandUrl: https://wire.com
          brandLabel: wire.com
          brandLabelUrl: https://wire.com
          brandLogoUrl: https://wire.com/p/img/email/logo-email-black.png
          brandService: Wire Service Provider
          copyright: "\xA9 WIRE SWISS GmbH"
          misuse: misuse@wire.com
          legal: https://wire.com/legal/
          forgot: https://wire.com/forgot/
          support: https://support.wire.com/
      user:
        passwordResetUrl: https://account.hetz-suk-a.zinfradev.com/reset/?key=${key}&code=${code}
        activationUrl: https://account.hetz-suk-a.zinfradev.com/verify/?key=${key}&code=${code}
        smsActivationUrl: https://account.hetz-suk-a.zinfradev.com/v/${code}
        deletionUrl: https://account.hetz-suk-a.zinfradev.com/d/?key=${key}&code=${code}
        invitationUrl: https://account.hetz-suk-a.zinfradev.com/i/${code}
    smtp:
      host: smtp
      port: 25
      connType: plain
  turnStatic:
    v1: []
    v2:
    - turn:136.243.148.68:3478
    - turn:136.243.148.68:3478?transport=tcp
  metrics:
    serviceMonitor:
      enabled: true
proxy:
  image:
    repository: assethost:80/wire-server/wire/proxy
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  replicaCount: 3
  metrics:
    serviceMonitor:
      enabled: true
cannon:
  image:
    repository: assethost:80/wire-server/wire/cannon
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  nginzImage:
    repository: assethost:80/wire-server/wire/nginz
    tag: 5.23.0
    pullPolicy: IfNotPresent
  replicaCount: 3
  drainTimeout: 10
  config:
    cassandra:
      host: cassandra-external
    rabbitmq:
      host: rabbitmq-external
  metrics:
    serviceMonitor:
      enabled: true
cargohold:
  image:
    repository: assethost:80/wire-server/wire/cargohold
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  replicaCount: 3
  config:
    aws:
      region: eu-west-1
      s3Bucket: assets
      s3Endpoint: http://minio-external:9000
      s3DownloadEndpoint: https://assets.hetz-suk-a.zinfradev.com
    enableFederation: false
    settings:
      federationDomain: hetz-suk-a.zinfradev.com
  metrics:
    serviceMonitor:
      enabled: true
galley:
  image:
    repository: assethost:80/wire-server/wire/galley
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  replicaCount: 3
  config:
    cassandra:
      host: cassandra-external
    rabbitmq:
      host: rabbitmq-external
    postgresql:
      host: postgresql-external-rw
      port: '5432'
      user: wire-server
      dbname: wire-server
    postgresqlMigration:
      conversation: postgresql
    enableFederation: false
    settings:
      conversationCodeURI: https://account.hetz-suk-a.zinfradev.com/conversation-join/
      federationDomain: hetz-suk-a.zinfradev.com
      featureFlags:
        sso: disabled-by-default
        legalhold: disabled-permanently
        teamSearchVisibility: disabled-by-default
    aws:
      region: eu-west-1
  metrics:
    serviceMonitor:
      enabled: true
gundeck:
  image:
    repository: assethost:80/wire-server/wire/gundeck
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  replicaCount: 3
  config:
    cassandra:
      host: cassandra-external
    rabbitmq:
      host: rabbitmq-external
    aws:
      account: '123456789012'
      region: eu-west-1
      arnEnv: integration
      queueName: integration-gundeck-events
      sqsEndpoint: http://fake-aws-sqs:4568
      snsEndpoint: http://fake-aws-sns:4575
    maxConcurrentNativePushes:
      soft: 200
  metrics:
    serviceMonitor:
      enabled: true
  resources:
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 2Gi
nginz:
  images:
    nginz:
      repository: assethost:80/wire-server/wire/nginz
      tag: 5.23.0
  replicaCount: 3
  config:
    ws:
      useProxyProtocol: false
  nginx_conf:
    dns_resolver: coredns
    env: prod
    external_env_domain: hetz-suk-a.zinfradev.com
    deeplink:
      endpoints:
        backendURL: https://nginz-https.hetz-suk-a.zinfradev.com
        backendWSURL: https://nginz-ssl.hetz-suk-a.zinfradev.com
        teamsURL: https://teams.hetz-suk-a.zinfradev.com
        accountsURL: https://account.hetz-suk-a.zinfradev.com
        blackListURL: https://clientblacklist.wire.com/prod
        websiteURL: https://wire.com
      title: My Custom Wire Backend
  drainTimeout: 10
  terminationGracePeriodSeconds: 30
  metrics:
    serviceMonitor:
      enabled: true
spar:
  image:
    repository: assethost:80/wire-server/wire/spar
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  replicaCount: 3
  config:
    cassandra:
      host: cassandra-external
    logLevel: Debug
    domain: hetz-suk-a.zinfradev.com
    appUri: https://nginz-https.hetz-suk-a.zinfradev.com
    ssoUri: https://nginz-https.hetz-suk-a.zinfradev.com/sso
    maxttlAuthreq: 28800
    maxttlAuthresp: 28800
    contacts:
    - type: ContactSupport
      company: YourCompany
      email: email:support@hetz-suk-a.zinfradev.com
  metrics:
    serviceMonitor:
      enabled: true
legalhold:
  host: legalhold.hetz-suk-a.zinfradev.com
  wireApiHost: https://nginz-https.hetz-suk-a.zinfradev.com
  metrics:
    serviceMonitor:
      enabled: true
federator:
  image:
    repository: assethost:80/wire-server/wire/federator
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  tls:
    useSharedFederatorSecret: true
  metrics:
    serviceMonitor:
      enabled: true
background-worker:
  image:
    repository: assethost:80/wire-server/wire/background-worker
    tag: 5.23.0
    pullPolicy: IfNotPresent
  imagePullPolicy: IfNotPresent
  config:
    cassandra:
      host: cassandra-external
    rabbitmq:
      host: rabbitmq-external
    enableFederation: false
  metrics:
    serviceMonitor:
      enabled: true
